name: SafeTrace Political Money Graph

on:
  push:
    paths:
      - "safetrace/political_money/**"
      - ".github/workflows/safetrace-political-money.yml"
  pull_request:
    paths:
      - "safetrace/political_money/**"
      - ".github/workflows/safetrace-political-money.yml"
  workflow_dispatch:
  schedule:
    - cron: "43 6 * * 1"

permissions:
  contents: read

jobs:
  validate-and-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run graph safeguards
        run: python -m unittest discover -s safetrace/political_money/tests -v
      - name: Build reviewed graph
        run: python -m safetrace.political_money.build_graph --output artifacts/public/political-money-graph.json
      - name: Snapshot official donation and lobbying sources
        run: python -m safetrace.source_engine.cli --registry safetrace/political_money/data/sources.json --output artifacts/source-snapshots
      - name: Upload auditable graph bundle
        uses: actions/upload-artifact@v4
        with:
          name: safetrace-political-money-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 90
