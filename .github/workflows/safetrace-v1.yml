name: SafeTrace v1.0 release gate

on:
  push:
    paths:
      - "safetrace/**"
      - ".github/workflows/safetrace-v1.yml"
  pull_request:
    paths:
      - "safetrace/**"
      - ".github/workflows/safetrace-v1.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install case-pack dependency
        run: python -m pip install --disable-pip-version-check reportlab
      - name: Run existing SafeTrace tests
        run: |
          python -m unittest discover -s safetrace/source_engine/tests -v
          python -m unittest discover -s safetrace/political_money/tests -v
          python -m unittest discover -s safetrace/review_desk/tests -v
          python -m unittest discover -s safetrace/arms_monitor/tests -v
          python -m unittest discover -s safetrace/monitoring/tests -v
          python -m unittest discover -s safetrace/case_packs/tests -v
      - name: Run governance and pilot tests
        run: |
          python -m unittest discover -s safetrace/governance/tests -v
          python -m unittest discover -s safetrace/pilot/tests -v
          python -m unittest discover -s safetrace/v1/tests -v
      - name: Generate synthetic pilot report
        run: python -m safetrace.pilot.run_pilot --output safetrace/pilot/public
      - name: Validate v1.0 release boundary
        run: python -m safetrace.v1.cli --root . --output safetrace/v1/status.json
      - name: Upload pilot-ready artefacts
        uses: actions/upload-artifact@v4
        with:
          name: safetrace-v1-pilot-ready-${{ github.run_id }}
          path: |
            safetrace/pilot/public/
            safetrace/v1/status.json
          if-no-files-found: error
          retention-days: 90
