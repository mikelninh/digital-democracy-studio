name: SafeTrace v1.8 + Role Simulator release gate

on:
  push:
    paths:
      - "safetrace/**"
      - ".github/workflows/safetrace-v1.yml"
  pull_request:
    paths:
      - "safetrace/**"
      - ".github/workflows/safetrace-v1.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install case-pack dependency
        run: python -m pip install --disable-pip-version-check reportlab
      - name: Validate unified evidence foundation
        run: |
          python -m unittest discover -s safetrace/core/tests -v
          python -m safetrace.core.schema --check safetrace/core/schemas/safetrace-core-1.2.schema.json
          python -m safetrace.core.migration_report --root safetrace --output safetrace/core/migration-report.json
      - name: Validate Source Registry and Evidence Vault
        run: |
          python -m unittest discover -s safetrace/evidence_vault/tests -v
          python -m safetrace.evidence_vault.contracts --check safetrace/evidence_vault/schemas/evidence-vault-contracts-1.3.json
          python -m safetrace.evidence_vault.build_release_artifacts --safetrace-root safetrace --output-root safetrace/evidence_vault/artifacts
      - name: Validate Claim Ledger 2.0
        run: |
          python -m unittest discover -s safetrace/claim_ledger/tests -v
          python -m safetrace.claim_ledger.contracts --write safetrace/claim_ledger/artifacts/claim-ledger-contracts-1.4.json
          python -m safetrace.claim_ledger.build_release_artifacts --safetrace-root safetrace --output-root safetrace/claim_ledger/artifacts
      - name: Validate Auditable Agent Task Queue
        run: |
          python -m unittest discover -s safetrace/agent_queue/tests -v
          python -m safetrace.agent_queue.contracts --write safetrace/agent_queue/artifacts/agent-queue-contracts-1.5.json
          python -m safetrace.agent_queue.build_release_artifacts --output-root safetrace/agent_queue/artifacts
      - name: Validate Internal Investigation Desk
        run: |
          python -m unittest discover -s safetrace/investigation_desk/tests -v
          python -m safetrace.investigation_desk.contracts --write safetrace/investigation_desk/artifacts/investigation-desk-contracts-1.6.json
          python -m safetrace.investigation_desk.build_release_artifacts --output-root safetrace/investigation_desk/artifacts
      - name: Validate Case 004 technical reference workflow
        run: |
          python -m unittest discover -s safetrace/case_004_reference/tests -v
          python -m safetrace.case_004_reference.contracts --write safetrace/case_004_reference/artifacts/case-004-reference-contracts-1.7.json
          python -m safetrace.case_004_reference.build_reference --safetrace-root safetrace --output-root safetrace/case_004_reference/artifacts
      - name: Validate independent review readiness
        run: |
          python -m unittest discover -s safetrace/review_readiness/tests -v
          python -m safetrace.review_readiness.contracts --write safetrace/review_readiness/artifacts/review-readiness-contracts-1.8.json
          python -m safetrace.review_readiness.build_review_pack --safetrace-root safetrace --output-root safetrace/review_readiness/artifacts
      - name: Validate browser-local Role Simulator
        run: |
          python -m unittest discover -s safetrace/role_simulator/tests -v
          python -m safetrace.role_simulator.validate --root safetrace/role_simulator --output safetrace/role_simulator/artifacts/role-simulator-report.json
      - name: Run existing SafeTrace tests
        run: |
          python -m unittest discover -s safetrace/source_engine/tests -v
          python -m unittest discover -s safetrace/political_money/tests -v
          python -m unittest discover -s safetrace/review_desk/tests -v
          python -m unittest discover -s safetrace/arms_monitor/tests -v
          python -m unittest discover -s safetrace/monitoring/tests -v
          python -m unittest discover -s safetrace/case_packs/tests -v
          python -m unittest discover -s safetrace/law_fairness/tests -v
      - name: Run governance and pilot tests
        run: |
          python -m unittest discover -s safetrace/governance/tests -v
          python -m unittest discover -s safetrace/pilot/tests -v
          python -m unittest discover -s safetrace/v1/tests -v
      - name: Build law fairness public assessment
        run: python -m safetrace.law_fairness.build_public_status
      - name: Generate synthetic pilot report
        run: python -m safetrace.pilot.run_pilot --output safetrace/pilot/public
      - name: Validate v1.8 release boundary
        run: python -m safetrace.v1.cli --root . --output safetrace/v1/status.json
      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: safetrace-v1.8-role-simulator-${{ github.run_id }}
          path: |
            safetrace/core/schemas/safetrace-core-1.2.schema.json
            safetrace/core/migration-report.json
            safetrace/evidence_vault/schemas/evidence-vault-contracts-1.3.json
            safetrace/evidence_vault/artifacts/release-report.json
            safetrace/evidence_vault/artifacts/registry/current.json
            safetrace/claim_ledger/artifacts/claim-ledger-contracts-1.4.json
            safetrace/claim_ledger/artifacts/release-report.json
            safetrace/agent_queue/artifacts/agent-queue-contracts-1.5.json
            safetrace/agent_queue/artifacts/release-report.json
            safetrace/investigation_desk/artifacts/investigation-desk-contracts-1.6.json
            safetrace/investigation_desk/artifacts/release-report.json
            safetrace/investigation_desk/artifacts/public-export.json
            safetrace/case_004_reference/artifacts/
            safetrace/review_readiness/artifacts/
            safetrace/role_simulator/artifacts/role-simulator-report.json
            safetrace/pilot/public/
            safetrace/v1/status.json
            safetrace/law_fairness/public_status.json
          if-no-files-found: error
          retention-days: 90
