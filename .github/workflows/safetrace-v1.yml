name: SafeTrace v1.3 release gate

on:
  push:
    paths:
      - "safetrace/**"
      - ".github/workflows/safetrace-v1.yml"
  pull_request:
    paths:
      - "safetrace/**"
      - ".github/workflows/safetrace-v1.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install case-pack dependency
        run: python -m pip install --disable-pip-version-check reportlab
      - name: Validate unified evidence foundation
        run: |
          python -m unittest discover -s safetrace/core/tests -v
          python -m safetrace.core.schema --check safetrace/core/schemas/safetrace-core-1.2.schema.json
          python -m safetrace.core.migration_report --root safetrace --output safetrace/core/migration-report.json
      - name: Validate Source Registry and Evidence Vault
        run: |
          python -m unittest discover -s safetrace/evidence_vault/tests -v
          python -m safetrace.evidence_vault.contracts --check safetrace/evidence_vault/schemas/evidence-vault-contracts-1.3.json
          python -m safetrace.evidence_vault.build_release_artifacts --safetrace-root safetrace --output-root safetrace/evidence_vault/artifacts
      - name: Run existing SafeTrace tests
        run: |
          python -m unittest discover -s safetrace/source_engine/tests -v
          python -m unittest discover -s safetrace/political_money/tests -v
          python -m unittest discover -s safetrace/review_desk/tests -v
          python -m unittest discover -s safetrace/arms_monitor/tests -v
          python -m unittest discover -s safetrace/monitoring/tests -v
          python -m unittest discover -s safetrace/case_packs/tests -v
          python -m unittest discover -s safetrace/law_fairness/tests -v
      - name: Run governance and pilot tests
        run: |
          python -m unittest discover -s safetrace/governance/tests -v
          python -m unittest discover -s safetrace/pilot/tests -v
          python -m unittest discover -s safetrace/v1/tests -v
      - name: Build law fairness public assessment
        run: python -m safetrace.law_fairness.build_public_status
      - name: Generate synthetic pilot report
        run: python -m safetrace.pilot.run_pilot --output safetrace/pilot/public
      - name: Validate v1.3 release boundary
        run: python -m safetrace.v1.cli --root . --output safetrace/v1/status.json
      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: safetrace-v1.3-evidence-vault-${{ github.run_id }}
          path: |
            safetrace/core/schemas/safetrace-core-1.2.schema.json
            safetrace/core/migration-report.json
            safetrace/evidence_vault/schemas/evidence-vault-contracts-1.3.json
            safetrace/evidence_vault/artifacts/release-report.json
            safetrace/evidence_vault/artifacts/registry/current.json
            safetrace/evidence_vault/artifacts/evidence-vault-backup.tar.gz
            safetrace/pilot/public/
            safetrace/v1/status.json
            safetrace/law_fairness/public_status.json
          if-no-files-found: error
          retention-days: 90
